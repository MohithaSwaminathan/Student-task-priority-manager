<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Task Priority Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c10;
      --surface:  #13131a;
      --card:     #1a1a24;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f0f5;
      --muted:    #6b6b80;
      --accent:   #6c63ff;
      --high:     #ff4d6d;
      --med:      #ff9f1c;
      --low:      #2ec4b6;
      --high-bg:  rgba(255,77,109,0.1);
      --med-bg:   rgba(255,159,28,0.1);
      --low-bg:   rgba(46,196,182,0.1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      padding: 48px 40px 36px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0c0c10 0%, #14131f 100%);
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(108,99,255,0.18) 0%, transparent 70%);
      top: -120px; right: -80px;
      pointer-events: none;
    }
    header::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,77,109,0.1) 0%, transparent 70%);
      bottom: -100px; left: 200px;
      pointer-events: none;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    h1 em { font-style: normal; color: var(--accent); }
    .header-sub {
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      max-width: 1100px;
      margin: 32px auto 0;
      padding: 0 40px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stat {
      flex: 1; min-width: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color .2s;
    }
    .stat:hover { border-color: rgba(108,99,255,.3); }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
    }
    .stat-val.s-high { color: var(--high); }
    .stat-val.s-med  { color: var(--med); }
    .stat-val.s-low  { color: var(--low); }
    .stat-val.s-all  { color: var(--text); }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 36px auto 0;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      position: sticky;
      top: 24px;
    }
    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-title svg { opacity: .6; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 500;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .field input::placeholder { color: var(--muted); }
    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* importance slider row */
    .importance-row {
      display: flex;
      gap: 8px;
    }
    .imp-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .imp-btn:hover { border-color: var(--accent); color: var(--text); }
    .imp-btn.active-low  { background: var(--low-bg);  border-color: var(--low);  color: var(--low); }
    .imp-btn.active-med  { background: var(--med-bg);  border-color: var(--med);  color: var(--med); }
    .imp-btn.active-high { background: var(--high-bg); border-color: var(--high); color: var(--high); }

    .add-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
      margin-top: 6px;
      transition: opacity .15s, transform .1s;
    }
    .add-btn:hover { opacity: .88; transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* ── TASKS PANEL ── */
    .tasks-panel {}

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }
    .sort-note { font-size: 12px; color: var(--muted); }

    /* filter tabs */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
    }
    .ftab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .ftab:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
    .ftab.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }

    /* task list */
    #taskList { display: flex; flex-direction: column; gap: 12px; }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      animation: slideIn .25s ease;
      transition: border-color .2s, transform .15s;
    }
    .task-card:hover { border-color: rgba(255,255,255,.14); transform: translateY(-1px); }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .task-card.high { border-left: 3px solid var(--high); }
    .task-card.med  { border-left: 3px solid var(--med); }
    .task-card.low  { border-left: 3px solid var(--low); }

    .task-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
    }

    .task-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .score-badge {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .score-badge.high { color: var(--high); }
    .score-badge.med  { color: var(--med); }
    .score-badge.low  { color: var(--low); }
    .score-label { font-size: 10px; color: var(--muted); text-align: right; text-transform: uppercase; letter-spacing:.06em; }

    .priority-pill {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .priority-pill.high { background: var(--high-bg); color: var(--high); }
    .priority-pill.med  { background: var(--med-bg);  color: var(--med); }
    .priority-pill.low  { background: var(--low-bg);  color: var(--low); }

    .score-bar-wrap { width: 100%; margin-top: 10px; }
    .score-bar-track {
      height: 3px;
      background: rgba(255,255,255,.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .score-bar-fill.high { background: var(--high); }
    .score-bar-fill.med  { background: var(--med); }
    .score-bar-fill.low  { background: var(--low); }

    .del-btn {
      background: none;
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
      border-radius: 8px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
      margin-top: 4px;
    }
    .del-btn:hover { background: rgba(255,77,109,.12); border-color: var(--high); color: var(--high); }

    /* empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.08);
      border-radius: 16px;
    }
    .empty svg { opacity: .2; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all .3s ease;
      z-index: 99;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* responsive */
    @media(max-width:800px){
      .main { grid-template-columns: 1fr; padding: 0 16px; }
      .stats-bar { padding: 0 16px; }
      header { padding: 32px 16px 24px; }
      .form-card { position: static; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <h1>Student Task <em>Priority</em> Assistant</h1>
    <p class="header-sub">Enter your tasks — the scoring algorithm ranks them by urgency, importance &amp; effort.</p>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><span class="stat-label">Total Tasks</span><span class="stat-val s-all" id="sAll">0</span></div>
  <div class="stat"><span class="stat-label">🔴 High Priority</span><span class="stat-val s-high" id="sHigh">0</span></div>
  <div class="stat"><span class="stat-label">🟠 Medium</span><span class="stat-val s-med" id="sMed">0</span></div>
  <div class="stat"><span class="stat-label">🟢 Low</span><span class="stat-val s-low" id="sLow">0</span></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- FORM -->
  <div class="form-card">
    <div class="form-title">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add New Task
    </div>

    <div class="field">
      <label>Task Name</label>
      <input id="task" placeholder="e.g. Submit DSA assignment…">
    </div>

    <div class="field">
      <label>Deadline</label>
      <input type="date" id="deadline">
    </div>

    <div class="field">
      <label>Importance Level</label>
      <div class="importance-row">
        <div class="imp-btn active-low" data-val="1" onclick="selectImp(this,1)">Low</div>
        <div class="imp-btn" data-val="3" onclick="selectImp(this,3)">Medium</div>
        <div class="imp-btn" data-val="5" onclick="selectImp(this,5)">High</div>
      </div>
      <input type="hidden" id="importance" value="1">
    </div>

    <div class="field">
      <label>Estimated Effort (hours)</label>
      <input id="effort" type="number" min="0.5" step="0.5" placeholder="e.g. 3">
    </div>

    <button class="add-btn" onclick="addTask()">+ Add Task</button>

  </div>

  <!-- TASKS -->
  <div class="tasks-panel">
    <div class="panel-header">
      <span class="panel-title">Task Queue</span>
      <span class="sort-note">Sorted by priority score ↓</span>
    </div>

    <div class="filter-tabs">
      <button class="ftab active" onclick="setFilter('all',this)">All</button>
      <button class="ftab" onclick="setFilter('high',this)">🔴 High</button>
      <button class="ftab" onclick="setFilter('med',this)">🟠 Medium</button>
      <button class="ftab" onclick="setFilter('low',this)">🟢 Low</button>
    </div>

    <div id="taskList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  let tasks = [];
  let currentFilter = 'all';

  // ── IMPORTANCE SELECTOR ──
  function selectImp(el, val) {
    document.querySelectorAll('.imp-btn').forEach(b => {
      b.className = 'imp-btn';
    });
    if (val === 1) el.className = 'imp-btn active-low';
    else if (val === 3) el.className = 'imp-btn active-med';
    else el.className = 'imp-btn active-high';
    document.getElementById('importance').value = val;
  }

  // ── FILTER ──
  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  // ── SCORING FORMULA (same as original) ──
  function calculateScore(task) {
    const today    = new Date();
    const deadline = new Date(task.deadline);
    const daysLeft = (deadline - today) / (1000 * 60 * 60 * 24);
    const urgency  = 10 - daysLeft;
    return (task.importance * 2) + urgency - task.effort;
  }

  function getClass(score) {
    if (score > 10) return 'high';
    if (score > 5)  return 'med';
    return 'low';
  }

  function getLabel(score) {
    if (score > 10) return 'High Priority';
    if (score > 5)  return 'Medium';
    return 'Low Priority';
  }

  // ── RENDER ──
  function render() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.sort((a, b) => calculateScore(b) - calculateScore(a));

    const filtered = tasks.filter(t => {
      if (currentFilter === 'all') return true;
      return getClass(calculateScore(t)) === currentFilter;
    });

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p>${currentFilter === 'all' ? 'No tasks yet. Add one from the left!' : 'No ' + currentFilter + ' priority tasks.'}</p>
        </div>`;
      updateStats();
      return;
    }

    // max score for bar scaling
    const maxScore = Math.max(...tasks.map(t => Math.abs(calculateScore(t))), 1);

    filtered.forEach((task, i) => {
      const score   = calculateScore(task);
      const cls     = getClass(score);
      const label   = getLabel(score);
      const barPct  = Math.min(Math.max(((score + 5) / (maxScore + 5)) * 100, 5), 100);

      const daysLeft = Math.round((new Date(task.deadline) - new Date()) / (1000*60*60*24));
      const daysStr  = daysLeft < 0 ? 'Overdue' : daysLeft === 0 ? 'Due today' : `${daysLeft}d left`;

      const card = document.createElement('div');
      card.className = `task-card ${cls}`;
      card.innerHTML = `
        <div>
          <div class="task-name">${escHtml(task.name)}</div>
          <div class="task-meta">
            <span class="meta-chip">📅 ${task.deadline} &nbsp;·&nbsp; ${daysStr}</span>
            <span class="meta-chip">⚡ ${task.effort}h effort</span>
            <span class="meta-chip">⭐ Importance ${task.importance}/5</span>
          </div>
          <div class="score-bar-wrap">
            <div class="score-bar-track">
              <div class="score-bar-fill ${cls}" style="width:${barPct.toFixed(1)}%"></div>
            </div>
          </div>
        </div>
        <div class="task-right">
          <div>
            <div class="score-badge ${cls}">${score.toFixed(1)}</div>
            <div class="score-label">Score</div>
          </div>
          <span class="priority-pill ${cls}">${label}</span>
          <button class="del-btn" onclick="deleteTask(${task.id})" title="Remove task">✕</button>
        </div>
      `;
      list.appendChild(card);
    });

    updateStats();
  }

  // ── STATS ──
  function updateStats() {
    const scores = tasks.map(t => calculateScore(t));
    document.getElementById('sAll').textContent  = tasks.length;
    document.getElementById('sHigh').textContent = scores.filter(s => s > 10).length;
    document.getElementById('sMed').textContent  = scores.filter(s => s > 5 && s <= 10).length;
    document.getElementById('sLow').textContent  = scores.filter(s => s <= 5).length;
  }

  // ── ADD ──
  function addTask() {
    const name       = document.getElementById('task').value.trim();
    const deadline   = document.getElementById('deadline').value;
    const importance = parseInt(document.getElementById('importance').value);
    const effort     = parseFloat(document.getElementById('effort').value);

    if (!name || !deadline || isNaN(effort) || effort <= 0) {
      toast('⚠️ Please fill in all fields!'); return;
    }

    tasks.push({ name, deadline, importance, effort, id: Date.now() });

    document.getElementById('task').value   = '';
    document.getElementById('effort').value = '';

    render();
    toast('✅ Task added & sorted!');
  }

  // ── DELETE ──
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    render();
    toast('🗑️ Task removed.');
  }

  // ── TOAST ──
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ── UTIL ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // init
  render();
</script>
</body>
</html>
